version: '3.8'

services:
  huginn-server:
    build:
      context: ../
      dockerfile: docker/Dockerfile.server
    ports:
      - "9090:9090"
      - "9091:9091"
    volumes:
      - ./logs:/app/logs
      - ./keys:/app/keys
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus